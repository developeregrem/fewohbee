guest_category_modifier:
  title: "Preisanpassungen je Gastkategorie"
  description: "Lege je Gastkategorie einen Aufschlag, Rabatt, Pauschalpreis oder \"frei\" auf den Übernachtungspreis fest. Der Erwachsenenpreis bleibt der Basistarif."
  add: "Preisanpassung hinzufügen"
  empty: "Noch keine Preisanpassungen angelegt — Übernachtungspreise gelten unverändert für alle Kategorien."
  delete:
    ask: "Diese Preisanpassung wirklich löschen?"

  type:
    surcharge_absolute: "Aufschlag (Betrag)"
    discount_percent: "Rabatt (%)"
    flat_rate: "Pauschalpreis je Nacht"
    free: "Kostenlos"

  field:
    category: "Gastkategorie"
    category.help: "Es werden nur Kategorien angezeigt, auf die ein Modifier wirken kann: keine Erwachsenen-Kategorien (Basistarif) und nur Kategorien, die zur Zimmerbelegung zählen. Nicht-belegende Gäste (z. B. Kleinkinder im Babybett) werden vom Apartmentpreis ohnehin nicht erfasst."
    type: "Art der Anpassung"
    type.help: "Aufschlag addiert einen Betrag zum Erwachsenenpreis. Rabatt zieht einen Prozentsatz ab. Pauschalpreis ersetzt den Erwachsenenpreis komplett. Kostenlos = 0,00."
    value: "Wert"
    value.help: "Betrag in der eingestellten Währung bei Aufschlag/Pauschalpreis, Prozentsatz bei Rabatt. Bei \"Kostenlos\" wird der Wert ignoriert."
