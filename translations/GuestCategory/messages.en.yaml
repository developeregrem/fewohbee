    adult_rule_override: "Allow this booking without an adult guest"

  statistical_group:
    adult: "Adult"
    child: "Child"
    infant: "Infant"
    other: "Other"

  col:
    name: "Name"
    acronym: "Acronym"
    statistical_group: "Group"
    flags: "Flags"
    age: "Age"
    active: "Active"
    action: "Action"
    count: "Count"

  flash:
    create:
      success: "Guest category created."
    edit:
      success: "Guest category saved."
    delete:
      success: "Guest category deleted."
      error:
        system: "System categories cannot be deleted."

  default:
    adult:
      name: "Adults"
      acronym: "ADT"
    child:
      name: "Child 6–17"
      acronym: "C6-17"
    infant:
