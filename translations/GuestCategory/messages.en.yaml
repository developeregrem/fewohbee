guest_category:
  title: "Guest categories"
  description: "Manage guest categories (e.g. adults, children, non-liable guests)"
  add: "Add guest category"
  delete:
    ask: "Are you sure you want to delete this guest category?"
  system:
    locked: "System categories cannot be deleted."
  persons_total: "Persons total (occupancy)"
  not_in_room_price: "Not included in room price"
  not_in_room_price.help: "Guests in this category do not count toward room occupancy and are not part of the apartment price — they are automatically excluded from the overnight charge. A price modifier (e.g. \"free\") is neither needed nor effective here."

  flag:
    adult: "Adult"
    occupancy: "occupies room bed"
    no_occupancy: "does not occupy a room bed"

  warning:
    no_adult: "This booking contains no adult guest. Enable the override below to save anyway."
    over_capacity: "Room bed capacity reached."

  field:
    name: "Name"
    acronym: "Acronym"
    acronym.help: "Short label, e.g. ADT, C6-16, INF."
    statistical_group: "Group"
    statistical_group.help: "Defines how this category is evaluated. Categories in the \"Adult\" group satisfy the check that a booking normally needs at least one adult guest."
    is_counted_in_occupancy: "Counts as an occupied room bed"
    is_counted_in_occupancy.help: "Enable this when guests in this category occupy a bed in the room. This count is subtracted from the available beds. Disable it, for example, for infants in a cot."
    min_age: "Min age"
    max_age: "Max age"
    sort_order: "Sort order"
    active: "Active"
    subsidiaries: "Available in properties"
    subsidiaries.help: "Leave empty = globally available."
    adult_rule_override: "Allow this booking without an adult guest"

  statistical_group:
    adult: "Adult"
    child: "Child"
    infant: "Infant"
    other: "Other"

  col:
    name: "Name"
    acronym: "Acronym"
    statistical_group: "Group"
    flags: "Flags"
    age: "Age"
    active: "Active"
    action: "Action"
    count: "Count"

  flash:
    create:
      success: "Guest category created."
    edit:
      success: "Guest category saved."
    delete:
      success: "Guest category deleted."
      error:
        system: "System categories cannot be deleted."

  default:
    adult:
      name: "Adults"
      acronym: "ADT"
    child:
      name: "Child 6–17"
      acronym: "C6-17"
    infant:
      name: "Infant 0–5"
      acronym: "INF"
    exempt:
      name: "Non-liable guests"
      acronym: "NL"

guest_category_modifier:
  title: "Per-category surcharges / discounts"
  description: "Define a surcharge, discount, flat rate or \"free\" per guest category on top of the nightly rate. The adult rate stays the base price. Modifiers only apply to nightly rates calculated per person — not to flat-rate or per-room prices."
  threshold_hint: "From which occupancy these modifiers take effect (minimum full-fare guests) is configured per room category — e.g. so that children are only discounted from 3 guests onwards."
  add: "Add modifier"
  empty: "No modifiers configured yet — nightly rates apply unchanged for every category."
  delete:
    ask: "Really delete this modifier?"

  type:
    surcharge_absolute: "Surcharge (amount)"
    discount_percent: "Discount (%)"
    flat_rate: "Flat rate per night"
    free: "Free"

  field:
    category: "Guest category"
    category.help: "Only categories on which a modifier can take effect are listed: no adult categories (they are the base rate) and only categories that count toward room occupancy. Non-occupancy guests (e.g. infants in a cot) are not billed by the apartment line."
    type: "Modifier type"
    type.help: "Surcharge adds an amount to the adult rate. Discount subtracts a percentage. Flat rate replaces the adult rate. Free = 0.00."
    value: "Value"
    value.help: "Amount in the configured currency for surcharge/flat rate, percentage for discount. Ignored for \"Free\"."
    valid_from: "Valid from"
    valid_to: "Valid to"
    sort_order: "Sort order"
    active: "Active"

  col:
    category: "Guest category"
    type: "Type"
    value: "Value"
    validity: "Validity"
    active: "Active"
    action: "Action"

  flash:
    create:
      success: "Modifier created."
    edit:
      success: "Modifier saved."
    delete:
      success: "Modifier deleted."
