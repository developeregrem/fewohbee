price.revenue_account.help: >-
  Optional and only used in workflows. Specifies which revenue account this price posts to in the booking
  journal. If empty, the default account of the tax rate is used (e.g. 8300 for
  7%, 8400 for 19%). Useful when certain revenues (food, drinks, tourist tax)
  should go to separate accounts.
price.package.remainder.help: >-
  Marks this component as the remainder. Its value is computed automatically
  from what is left after all other components are subtracted from the total
  price. Useful when mixing percent and fixed-amount components, or to
  absorb rounding cents. Only one component per package may be marked as
  remainder.
