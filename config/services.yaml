# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:
    locale: '%env(LOCALE)%'
    fromMail:  '%env(FROM_MAIL)%'
    fromName: '%env(FROM_NAME)%'
    returnPath: '%env(RETURN_PATH)%'
    webHost: '%env(WEB_HOST)%'
    publicUploadDirectory: 'resources/images/export'
    roomCategoryImagePublicDirectory: 'resources/images/room-categories'
    version: '4.8.0'
    mailCopy: '%env(default:default_mailcopy:MAIL_COPY)%'
    mailEnabled: '%env(bool:default:default_mail_enabled:MAIL_ENABLED)%'
    default_mailcopy: 'true'
    default_mail_enabled: 'true'
    passkey_enabled: '%env(bool:PASSKEY_ENABLED)%'
    default_frame_ancestors: ''
    frameAncestors: '%env(default:default_frame_ancestors:FRAME_ANCESTORS)%'
    # fallback parameters
    # legacy mail env defaults; new installations configure these in the UI
    env(FROM_MAIL): ''
    env(FROM_NAME): ''
    env(RETURN_PATH): ''
    env(MAILER_DSN): 'null://null'
    # define the redis host
    env(REDIS_HOST): 'redis'
    # define the used redix index
    env(REDIS_IDX): '1'
    # storage adapter: 'local' (default, uploads in public/) or 's3' (S3-compatible bucket)
    env(STORAGE_ADAPTER): 'local'
    env(STORAGE_S3_ENDPOINT): ''
    env(STORAGE_S3_REGION): ''
    env(STORAGE_S3_BUCKET): ''
    env(STORAGE_S3_KEY): ''
    env(STORAGE_S3_SECRET): ''
    env(STORAGE_S3_PUBLIC_URL): ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        public: false       # Allows optimizing the container by removing unused services; this also means
                            # fetching services directly from the container via $container->get() won't work.
                            # The best practice is to be explicit about your dependencies anyway.
    _instanceof:
        App\Service\EInvoice\EInvoiceProfileGeneratorInterface:
            tags: ['app.einvoice.profile']
        App\Interfaces\ITemplatePreviewProvider:
            tags: ['app.template_preview_provider']
        App\Workflow\Trigger\WorkflowTriggerInterface:
            tags: ['app.workflow.trigger']
        App\Workflow\Condition\WorkflowConditionInterface:
            tags: ['app.workflow.condition']
        App\Workflow\Action\WorkflowActionInterface:
            tags: ['app.workflow.action']
        App\Service\BookingJournal\BankImport\Parser\ParserInterface:
            tags: ['app.bank_import.parser']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/*'
        exclude: '../src/{Entity,Migrations,Tests,Controller/Attribute,Exception,Kernel.php}'

    # controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    App\Controller\:
        resource: '../src/Controller'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones    
    App\Service\MailService:
        arguments:
            $mailEnabled: '%mailEnabled%'

    App\Service\SmtpPasswordCrypto:
        arguments:
            $appSecret: '%env(APP_SECRET)%'
    
    App\Service\AppSettingsService:
        arguments:
            $fromMail: '%fromMail%'
            $fromName: '%fromName%'
            $returnPath: '%returnPath%'
            $mailCopy: '%mailCopy%'
            $mailerDsn: '%env(MAILER_DSN)%'

    App\Service\TemplatesService:
        arguments:
            - '%webHost%'
            
    # S3 client (only instantiated when STORAGE_ADAPTER=s3; flysystem.php conditionally
    # wires storages that reference this id). Works with any S3-compatible provider
    # (Hetzner Object Storage, MinIO, R2, Wasabi, AWS) via the configured endpoint.
    storage.s3_client:
        class: Aws\S3\S3Client
        arguments:
            - endpoint: '%env(STORAGE_S3_ENDPOINT)%'
              region: '%env(STORAGE_S3_REGION)%'
              version: 'latest'
              use_path_style_endpoint: true
              credentials:
                  key: '%env(STORAGE_S3_KEY)%'
                  secret: '%env(STORAGE_S3_SECRET)%'

    App\Service\Storage\ImageUrlGenerator:
        arguments:
            $adapter: '%env(STORAGE_ADAPTER)%'
            $s3PublicUrl: '%env(STORAGE_S3_PUBLIC_URL)%'
            $localExportPrefix: '%publicUploadDirectory%'
            $localRoomCategoryPrefix: '%roomCategoryImagePublicDirectory%'

    App\Service\FileUploader:
        arguments:
            $storage: '@images.export.storage'
            $urlGenerator: '@App\Service\Storage\ImageUrlGenerator'

    App\Service\RoomCategoryImageService:
        arguments:
            $storage: '@images.roomcat.storage'
            $urlGenerator: '@App\Service\Storage\ImageUrlGenerator'

    App\Service\EInvoice\EInvoiceProfileRegistry:
        arguments:
            $profiles: !tagged_iterator app.einvoice.profile

    App\Service\TemplatePreview\TemplatePreviewProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.template_preview_provider

    App\Service\WebauthnService:
        arguments:
            $rpId: '%env(RELYING_PARTY_ID)%'
            $rpName: '%env(RELYING_PARTY_NAME)%'

    App\EventSubscriber\EmbeddingSecuritySubscriber:
        arguments:
            $frameAncestors: '%frameAncestors%'

    App\Workflow\Trigger\WorkflowTriggerRegistry:
        arguments:
            $triggers: !tagged_iterator app.workflow.trigger

    App\Workflow\Condition\WorkflowConditionRegistry:
        arguments:
            $conditions: !tagged_iterator app.workflow.condition

    App\Workflow\Action\WorkflowActionRegistry:
        arguments:
            $actions: !tagged_iterator app.workflow.action
