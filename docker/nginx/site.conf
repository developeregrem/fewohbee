server_tokens off;

# Do not set X-Frame-Options for /book paths — embedding is controlled by the app via CSP frame-ancestors
map $request_uri $x_frame_options {
    ~^/book  "";
    default  "SAMEORIGIN";
}

server {
    listen 80;
    listen [::]:80;
    index index.html index.php;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    root /var/www/html/public;

    include /etc/nginx/conf.d/server_name.active;

    # other configs
    include /etc/nginx/conf.d/site-enabled-http/*;

    return 301 https://$server_name$request_uri;
}

server {
    listen      443           ssl;
    listen [::]:443           ssl;
    http2  on;
    client_max_body_size 10m;

    index index.html index.php;

    root /var/www/html/public;

    include /etc/nginx/conf.d/server_name.active;

    include /etc/nginx/conf.d/snippets/header.snippet;
    include /etc/nginx/conf.d/snippets/sslconf.snippet;

    error_log                 /var/log/nginx/error.log;
    access_log                /var/log/nginx/access.log;

    # other configs
    include /etc/nginx/conf.d/site-enabled-https/*;
}

server {
    # this vhost is for internal connections only (e.g. mpdf fetches images from
    # here via WEB_HOST, and the docker healthcheck calls /health/live here to
    # bypass the SSL redirect on port 80).
    listen 8080;

    root /var/www/html/public;

    include /etc/nginx/conf.d/server_name.active;
    include /etc/nginx/conf.d/site-enabled-https/*;
}
